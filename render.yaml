services:
  - type: web
    name: prahari-sentinel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/state
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
